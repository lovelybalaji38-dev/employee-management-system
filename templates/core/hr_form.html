{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="glass-card p-4">
            <h3 class="mb-4 fw-bold text-primary">{{ title }}</h3>
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">First Name</label>
                        {{ form.first_name }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Last Name</label>
                        {{ form.last_name }}
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    {{ form.email }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        {{ form.password }}
                        <i class="bi bi-eye toggle-password-icon password-toggle-icon cursor-pointer fs-5"></i>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'manage_hr' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create HR User</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
